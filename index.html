<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ticket Book Calculator</title>
<link rel="icon" href="Icon.png" type="image/png">

<style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #f0f0f0;
    margin: 0;
    transition: background 0.3s, color 0.3s;
}

body.dark {
    background: #121212;
    color: #e0e0e0;
}

.dark-toggle {
    position: fixed;
    top: 15px;
    right: 15px;
    z-index: 1000;
}

.container {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 20px;
    flex-wrap: wrap;
}

.panel {
    background: #fff;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    padding: 25px;
    width: 450px;
    transition: background 0.3s, color 0.3s;
}

body.dark .panel {
    background: #1e1e1e;
    color: #e0e0e0;
}

.header {
    background: #222;
    color: #f5c518;
    padding: 15px;
    text-align: center;
    border-radius: 10px;
    margin-bottom: 20px;
    font-weight: bold;
    font-size: 18px;
}

input, textarea {
    width: 92%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 14px;
    transition: background 0.3s, color 0.3s, border 0.3s;
}

body.dark input, body.dark textarea {
    background: #2a2a2a;
    color: #e0e0e0;
    border: 1px solid #555;
}

button {
    padding: 12px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    font-size: 14px;
    margin: 5px 0;
    transition: all 0.2s;
}

button:hover { opacity: 0.9; }

.yes { background: #28a745; color: white; width: 48%; }
.no { background: #dc3545; color: white; width: 48%; }
.add { background: #f5c518; color: #222; width: 100%; margin-top: 15px; }
.finish { background: #222; color: #f5c518; width: 100%; margin-top: 15px; }
.reset { background: #f5c518; color: #222; width: 100%; margin-top: 10px; }
.copy { background: #007bff; color: white; font-size: 13px; padding: 6px 10px; border-radius: 6px; }

.flex {
    display: flex;
    justify-content: space-between;
    gap: 4%;
    margin-top: 5px;
}

#bookList, #output {
    border: 1px solid #ddd;
    padding: 12px;
    border-radius: 8px;
    background: #fafafa;
    max-height: 300px;
    overflow-y: auto;
    white-space: pre-line;
    margin-top: 10px;
}

body.dark #bookList, body.dark #output {
    background: #2a2a2a;
    border: 1px solid #555;
}

#loginOverlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #121212;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.login-box {
    background: #fff;
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    width: 320px;
}

body.dark .login-box { background: #1e1e1e; color: #e0e0e0; }

.error { color: #721c24; background: #f8d7da; padding: 8px; border-radius: 5px; font-size: 12px; margin-top: 10px; }
.message { color: #155724; background: #d4edda; padding: 6px; border-radius: 5px; font-size: 13px; }
.watermark { position: fixed; bottom: 10px; right: 15px; font-size: 12px; opacity: 0.6; color: #555; }
</style>
</head>

<body>

<div id="loginOverlay">
    <div class="login-box">
        <div class="header">System Login</div>
        <p style="font-size: 12px;">Enter your credentials to continue</p>
        <input type="email" id="loginEmail" placeholder="Email Address">
        <input type="password" id="loginPass" placeholder="Password">
        <button class="add" onclick="window.handleLogin()">Login</button>
        <div id="loginError" class="error" style="display:none;"></div>
    </div>
</div>

<button class="copy dark-toggle" onclick="toggleDarkMode()">Toggle Dark Mode</button>

<div class="container">
    <div class="panel">
        <div class="header">Ticket Entry</div>
        <div id="statusMsg"></div>
        
        <p>Select Date:</p>
        <input type="date" id="selectedDate">
        <input type="number" id="book" placeholder="Book Number">

        <p>Is the book finished?</p>
        <div class="flex">
            <button class="yes" onclick="setStatus('yes')">Yes</button>
            <button class="no" onclick="setStatus('no')">No</button>
        </div>

        <div id="inputs" style="display:none; margin-top:10px;">
            <input type="number" id="first" placeholder="First sold ticket">
            <input type="number" id="last" placeholder="Last / Remaining ticket">
        </div>

        <button class="add" onclick="addBook()">Add Book</button>

        <h4 style="margin-top:25px;">Driver & Cab Info:</h4>
        <input type="text" id="driverName" placeholder="Driver Name">
        <input type="text" id="cabNumber" placeholder="Cab Number">
        <input type="number" id="kilometers" placeholder="Kilometers (Km)">

        <button class="finish" onclick="finish()">Generate Message</button>
        <button class="reset" onclick="resetAll()">Reset</button>

        <h4>Books Added:</h4>
        <div id="bookList">No books added yet.</div>
    </div>

    <div class="panel">
        <div class="header">Summary</div>
        <div style="text-align:right; margin-bottom:10px;">
            <button class="copy" onclick="copySummary()">Copy</button>
        </div>
        <div id="output">No summary yet.</div>
        <textarea id="notesBox" style="height: 80px; margin-top: 15px;" placeholder="Write notes here..."></textarea>
    </div>
</div>

<div class="watermark">Developed by Dinada Balasuriya</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBpUXUmwWGghBQyHOSmOtFlv-1ZrOYztf0",
        authDomain: "kangaroo-portcity.firebaseapp.com",
        projectId: "kangaroo-portcity",
        storageBucket: "kangaroo-portcity.firebasestorage.app",
        messagingSenderId: "849097834633",
        appId: "1:849097834633:web:2e43784ea71a4d80310658"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    window.currentUser = "";

    window.handleLogin = () => {
        const email = document.getElementById("loginEmail").value;
        const pass = document.getElementById("loginPass").value;
        const errDiv = document.getElementById("loginError");

        signInWithEmailAndPassword(auth, email, pass)
            .catch(error => {
                errDiv.innerText = error.message;
                errDiv.style.display = "block";
            });
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            window.currentUser = user.email.split('@')[0].toUpperCase();
            document.getElementById("loginOverlay").style.display = "none";
        } else {
            document.getElementById("loginOverlay").style.display = "flex";
        }
    });
</script>

<script>
let status = "";
let report = [];
let oneWayReport = [];

function toggleDarkMode() { document.body.classList.toggle('dark'); }

function setStatus(choice) {
    status = choice;
    document.getElementById("inputs").style.display = "block";
}

function showMessage(msg, type='message') {
    const div = document.getElementById('statusMsg');
    div.className = type;
    div.innerText = msg;
    setTimeout(()=> { div.innerText = ''; }, 2500);
}

function addBook() {
    const bookVal = document.getElementById("book").value;
    const firstVal = document.getElementById("first").value;
    const lastVal = document.getElementById("last").value;

    if (!bookVal || !firstVal || !lastVal || !status) {
        showMessage("Fill all fields", "error");
        return;
    }

    const b = Number(bookVal), f = Number(firstVal), l = Number(lastVal);
    let tickets = (status === "yes") ? (l - f + 1) : (l - f);
    let line = `      TICKETS BOOK NO ${b} - ${f} - ${l} = ${tickets} TICKETS`;

    if (b < 100) oneWayReport.push({line, tickets});
    else report.push({line, tickets});

    updateBookList();
    document.getElementById("book").value = "";
    document.getElementById("first").value = "";
    document.getElementById("last").value = "";
    document.getElementById("inputs").style.display = "none";
    status = "";
}

function updateBookList() {
    const list = document.getElementById("bookList");
    let content = [...report, ...oneWayReport].map((item, i) => `${i+1}. ${item.line.trim()}`).join('\n');
    list.innerText = content || "No books added yet.";
}

function finish() {
    const dateVal = document.getElementById("selectedDate").value;
    if (!dateVal || (report.length === 0 && oneWayReport.length === 0)) {
        showMessage("Missing date or data", "error");
        return;
    }

    const d = new Date(dateVal);
    const dateStr = `*${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}*`;
    
    let bookColor = "*WHITE TICKET BOOK*";
    if (d.getDay() === 0) bookColor = "*BLUE TICKET BOOK*";
    else if (d.getDay() === 6) bookColor = "*YELLOW TICKET BOOK*";

    let message = `${dateStr}\n\n${bookColor}\n\n`;
    report.forEach(r => message += r.line + "\n");

    if (oneWayReport.length > 0) {
        message += `\n*ONE WAY TICKETS*\n\n`;
        oneWayReport.forEach(r => message += r.line + "\n");
    }

    const tN = report.reduce((s, r) => s + r.tickets, 0);
    const tO = oneWayReport.reduce((s, r) => s + r.tickets, 0);
    const totalAmt = (tN * 250) + (tO * 200);

    message += `\n*TICKET SUMMARY*\n\n`;
    message += `      NORMAL TICKETS ${tN}*250 = LKR ${(tN*250).toLocaleString()}\n`;
    message += `      ONEWAY TICKETS ${tO}*200 = LKR ${(tO*200).toLocaleString()}\n\n`;
    message += `      TOTAL AMOUNT = LKR ${totalAmt.toLocaleString()}`;

    const drv = document.getElementById("driverName").value || "N/A";
    const cab = document.getElementById("cabNumber").value || "N/A";
    const km = parseFloat(document.getElementById("kilometers").value) || 0;
    
    let kmRate = (parseInt(cab) > 9000) ? 260 : 200;
    let drvAmt = Math.min(totalAmt, (km * kmRate));
    if (parseInt(cab) > 9000) drvAmt = Math.min(drvAmt, 35000);

    message += `\n\nDRIVER - ${drv} - CAB ${cab} - ${km} KM | LKR ${drvAmt.toLocaleString()}`;
    
    // THE USERNAME ADDITION
    message += `\n\nCreated by: ${window.currentUser || "AUTHORIZED USER"}`;

    document.getElementById("output").innerText = message;
}

function resetAll() {
    if(confirm("Reset everything?")) location.reload();
}

function copySummary() {
    navigator.clipboard.writeText(document.getElementById("output").innerText);
    showMessage("Copied!");
}
</script>

</body>
</html>
